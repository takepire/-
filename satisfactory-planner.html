<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Satisfactory 工場プランナー</title>
<style>
:root{--bg:#1a1c20;--panel:#25282e;--panel2:#2d3138;--border:#3a3f47;--fg:#e8e6e3;--dim:#9aa0a8;--acc:#fa9549;--acc2:#e06c00;--ok:#7ec97e;--warn:#e0b050;--bad:#e07070;--blue:#6db3e8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;font-size:14px;line-height:1.5;padding-bottom:60px}
.wrap{max-width:820px;margin:0 auto;padding:10px}
h1{font-size:18px;color:var(--acc);padding:8px 0 2px}
h1 small{color:var(--dim);font-weight:normal;font-size:11px;margin-left:8px}
.tabs{display:flex;gap:6px;margin:10px 0}
.tab{flex:1;padding:10px 4px;text-align:center;background:var(--panel);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;user-select:none}
.tab.on{background:var(--acc2);border-color:var(--acc);color:#fff;font-weight:bold}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.row:last-child{margin-bottom:0}
label{font-size:12px;color:var(--dim)}
.fld{display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px}
input,select,button{font:inherit;background:var(--panel2);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:8px;width:100%}
input[type=number]{-moz-appearance:textfield}
select{appearance:auto}
button{cursor:pointer;background:var(--acc2);border-color:var(--acc);color:#fff;font-weight:bold;width:auto;padding:8px 16px}
button.ghost{background:var(--panel2);color:var(--fg);border-color:var(--border);font-weight:normal}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:10px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.card .v{font-size:19px;font-weight:bold;color:var(--acc)}
.card .t{font-size:11px;color:var(--dim)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:7px 6px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
th{color:var(--dim);font-weight:normal;font-size:11px;white-space:nowrap}
td.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.iname{font-weight:bold}
.iname small{color:var(--dim);font-weight:normal;display:block;font-size:10px}
.mch{color:var(--blue);white-space:nowrap}
.belt{font-size:11px;color:var(--dim);white-space:nowrap}
.rsel{max-width:230px;font-size:12px;padding:5px;margin-top:3px}
.ocin{width:58px;padding:3px 4px;font-size:12px;text-align:right}
.ocin.ov{border-color:var(--warn);color:var(--warn)}
.alt{color:var(--warn)}
details.tn{margin:2px 0 2px 0;border-left:2px solid var(--border);padding-left:10px}
details.tn>summary{cursor:pointer;list-style:none;padding:5px 6px;background:var(--panel2);border:1px solid var(--border);border-radius:6px;display:flex;flex-wrap:wrap;gap:4px 10px;align-items:baseline}
details.tn>summary::before{content:"▸";color:var(--acc);margin-right:2px}
details[open].tn>summary::before{content:"▾"}
details.tn>summary.leafy{cursor:default}
details.tn>summary.leafy::before{content:"●";font-size:8px;color:var(--ok)}
.sm-rate{color:var(--acc);font-weight:bold;white-space:nowrap}
.sm-mc{color:var(--blue);font-size:12px;white-space:nowrap}
.sm-rc{color:var(--dim);font-size:11px}
.rawtag{color:var(--ok);font-size:11px;border:1px solid var(--ok);border-radius:4px;padding:0 4px}
.cyc{color:var(--bad);font-size:11px}
.byp{color:var(--warn)}
.note{font-size:11px;color:var(--dim);margin-top:6px}
.err{color:var(--bad);padding:8px;font-size:13px}
.savebar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.savebar input{flex:1;min-width:120px;width:auto}
.slist{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.slist .si{display:flex;gap:6px;align-items:center;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:6px 8px}
.slist .si span{flex:1}
.slist button{padding:4px 10px;font-size:12px}
h2{font-size:14px;color:var(--acc);margin:14px 0 6px}
.chip{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:2px 10px;margin:2px;font-size:12px}
.chip.bneck{border-color:var(--bad);color:var(--bad)}
.noderow{display:grid;grid-template-columns:1.2fr 1.4fr .9fr 64px 58px 34px;gap:5px;align-items:end;margin-bottom:6px}
.noderow select,.noderow input{padding:6px 4px;font-size:12px}
.noderow .del{background:var(--panel2);border:1px solid var(--border);color:var(--bad);border-radius:6px;padding:6px 0;font-weight:bold}
.nlab{font-size:10px;color:var(--dim);display:block;margin-bottom:2px}
@media(max-width:540px){.noderow{grid-template-columns:1.2fr 1.3fr .9fr 56px 50px 30px}}
#toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--acc2);color:#fff;padding:8px 18px;border-radius:20px;display:none;z-index:9}
@media(max-width:480px){body{font-size:13px} td,th{padding:6px 4px}}
</style>
</head>
<body>
<div class="wrap">
<h1>Satisfactory 工場プランナー <small>v1.1 (ゲームVer1.0対応 / 全276レシピ)</small></h1>

<div class="tabs">
  <div class="tab on" id="tabT" onclick="setMode('target')">🎯 目標から逆算</div>
  <div class="tab" id="tabR" onclick="setMode('resource')">⛏️ 資源から順算</div>
</div>

<div class="panel" id="pnlTarget">
  <div class="row">
    <div class="fld"><label>作りたいアイテム</label><input id="tItem" list="itemList" placeholder="例: モジュラー・フレーム" autocomplete="off"></div>
    <div class="fld" style="max-width:120px"><label>目標生産数 /分</label><input id="tRate" type="number" value="10" min="0.1" step="any"></div>
  </div>
</div>

<div class="panel" id="pnlRes" style="display:none">
  <div class="row"><div class="fld"><label>作りたいアイテム(制約内で最大生産)</label><input id="rItem" list="itemList" placeholder="例: モジュラー・フレーム" autocomplete="off"></div></div>
  <label style="margin-bottom:4px;display:block">使用する資源ノード(複数可・合計供給量が制約になります)</label>
  <div id="nodeList"></div>
  <button class="ghost" onclick="addNode()" style="font-size:12px;padding:6px 12px">＋ 資源ノードを追加</button>
  <div class="note" id="rSupply"></div>
  <div class="note">※ここに追加した資源だけが制約になります。追加していない資源は無制限として扱います。</div>
</div>

<div class="panel">
  <div class="row">
    <div class="fld" style="max-width:170px"><label>生産設備の基本OC % (全体)</label><input id="pOC" type="number" value="100" min="1" max="250"></div>
    <div class="fld" style="max-width:210px"><label><input type="checkbox" id="bypCredit" checked style="width:auto;margin-right:5px">副産物を材料に充当する</label></div>
  </div>
  <div class="note">※工程ごとの個別OCは下の「生産工程」表で設定できます(<span class="alt">黄色</span>=個別指定中)。電力は クロック^1.321929 でスケール。</div>
</div>

<div id="out"></div>

<h2>💾 設計の保存・共有</h2>
<div class="panel">
  <div class="savebar"><input id="saveName" placeholder="設計名"><button onclick="saveDesign()">保存</button><button class="ghost" onclick="shareURL()">共有URLコピー</button></div>
  <div class="slist" id="saveList"></div>
</div>
<div class="note">データ出典: Satisfactory 1.0 (greeny/SatisfactoryTools)。数値は毎分換算。</div>
</div>
<datalist id="itemList"></datalist>
<div id="toast"></div>

// ---------- helpers ----------
const fmt = v => { const r = Math.round(v*1000)/1000; return r.toLocaleString('ja-JP',{maximumFractionDigits:3}); };
const itemLabel = i => D.items[i].j === D.items[i].n ? D.items[i].n : D.items[i].j;
const isRes = i => D.resources.includes(i);
const EXPO = 1.321929;

const producers = [];
D.items.forEach((_,i)=>{ producers[i] = D.recipes.map((r,ri)=>({r,ri})).filter(x=>x.r.o.some(o=>o[0]===i)); });

function defaultRecipe(i){
  if (isRes(i)) return -1;
  const ps = producers[i];
  if (!ps.length) return -1;
  const primary = ps.filter(x=>x.r.o[0][0]===i && !/^Unpackage/.test(x.r.n));
  let c = primary.find(x=>!x.r.a && x.r.n===D.items[i].n) || primary.find(x=>!x.r.a) || primary[0];
  return c ? c.ri : ps[0].ri;
}

// ---------- state ----------
let S = {
  mode:'target', tItem:null, tRate:10,
  rItem:null,
  nodes:[{res:null, purity:1, miner:'Desc_MinerMk2_C', oc:100, count:1}],
  pOC:100, byp:true, choice:{}, ocR:{}
};

function chosen(i){
  if (S.choice[i] !== undefined) return S.choice[i];
  return defaultRecipe(i);
}
function outRate(r,i){ const o = r.o.find(o=>o[0]===i); return o ? o[1] : 0; }
function ocOf(ri){ const v = S.ocR[ri]; return (v>=1 && v<=250) ? v : S.pOC; }

// ---------- solver ----------
function solve(targetItem, targetRate){
  const n = D.items.length;
  const x = new Float64Array(n);
  const ext = new Float64Array(n); ext[targetItem] = targetRate;
  let converged = false;
  for (let it=0; it<2000; it++){
    const demand = new Float64Array(n), byp = new Float64Array(n);
    for (let i=0;i<n;i++){
      if (x[i] <= 1e-12) continue;
      const ri = chosen(i); if (ri < 0) continue;
      const r = D.recipes[ri];
      const runs = x[i] / outRate(r,i);
      r.i.forEach(([j,rt]) => demand[j] += runs*rt);
      r.o.forEach(([j,rt]) => { if (j!==i) byp[j] += runs*rt; });
    }
    let maxd = 0;
    for (let j=0;j<n;j++){
      const need = ext[j] + demand[j] - (S.byp ? byp[j] : 0);
      const ri = chosen(j);
      const nx = (ri>=0 && !isRes(j)) ? Math.max(0, need) : 0;
      maxd = Math.max(maxd, Math.abs(nx - x[j]));
      x[j] = x[j]*0.5 + nx*0.5;
    }
    if (maxd < 1e-9){ converged = true; break; }
  }
  const demand = new Float64Array(n), byp = new Float64Array(n);
  const groups = new Map();
  for (let i=0;i<n;i++){
    if (x[i] <= 1e-9) continue;
    const ri = chosen(i); if (ri<0) continue;
    const r = D.recipes[ri];
    const runs = x[i] / outRate(r,i);
    groups.set(ri, (groups.get(ri)||0) + runs);
    r.i.forEach(([j,rt]) => demand[j] += runs*rt);
    r.o.forEach(([j,rt]) => { if (j!==i) byp[j] += runs*rt; });
  }
  const raw = {}, surplus = {};
  for (let j=0;j<D.items.length;j++){
    const need = ext[j] + demand[j];
    const ri = chosen(j);
    if ((ri<0 || isRes(j)) && need > 1e-9){
      const net = need - (S.byp ? Math.min(byp[j], need) : 0);
      if (net > 1e-9) raw[j] = net;
    }
  }
  for (let j=0;j<D.items.length;j++){
    if (byp[j] <= 1e-9) continue;
    const need = ext[j] + demand[j];
    const used = S.byp ? Math.min(byp[j], Math.max(0, need - x[j])) : 0;
    const sur = byp[j] - used;
    if (sur > 1e-9) surplus[j] = sur;
  }
  return { x, raw, surplus, groups, demand, converged };
}

function recipePower(r, clockPct){
  const m = D.machines[r.m];
  const base = r.vp || m.p;
  return base * Math.pow(clockPct/100, m.x||EXPO);
}
function groupStats(ri, runs){
  const r = D.recipes[ri];
  const clock = ocOf(ri);
  const oc = clock/100;
  const exact = runs / oc;
  const full = Math.floor(exact + 1e-9);
  const frac = exact - full;
  const cnt = frac > 1e-6 ? full+1 : full;
  let power = full * recipePower(r, clock);
  if (frac > 1e-6) power += recipePower(r, frac * clock);
  return { exact, cnt, frac, lastClock: frac*clock, power, clock };
}

function beltStr(rate, liquid){
  if (liquid){
    const p = D.pipes.findIndex(c=>c>=rate-1e-9);
    return p>=0 ? `パイプMk.${p+1}` : `パイプMk.2×${Math.ceil(rate/D.pipes[1])}`;
  }
  const b = D.belts.findIndex(c=>c>=rate-1e-9);
  return b>=0 ? `ベルトMk.${b+1}` : `ベルトMk.6×${Math.ceil(rate/1200)}`;
}

// ---------- resource nodes ----------
function extFor(res){ return Object.entries(D.ext).filter(([c,e])=>e.res.includes(res)); }
function nodeSupply(nd){
  const e = D.ext[nd.miner];
  if (!e) return 0;
  return e.rate * (e.noPurity ? 1 : nd.purity) * (nd.oc/100) * nd.count;
}
function addNode(){
  S.nodes.push({res:D.resources[0], purity:1, miner:'Desc_MinerMk2_C', oc:100, count:1});
  fixNode(S.nodes.length-1);
  renderNodes(); autosave(); render();
}
function delNode(k){ S.nodes.splice(k,1); renderNodes(); autosave(); render(); }
function fixNode(k){
  const nd = S.nodes[k];
  if (nd.res == null) nd.res = D.resources[0];
  const opts = extFor(nd.res);
  if (!opts.some(([c])=>c===nd.miner)) nd.miner = opts[0] ? opts[0][0] : null;
}
function updNode(k, f, v){
  const nd = S.nodes[k];
  if (f==='res'){ nd.res = +v; fixNode(k); renderNodes(); }
  else if (f==='purity') nd.purity = parseFloat(v);
  else if (f==='miner') nd.miner = v;
  else if (f==='oc') nd.oc = Math.min(250, Math.max(1, parseFloat(v)||100));
  else if (f==='count') nd.count = Math.max(1, parseInt(v)||1);
  autosave(); render();
}
function renderNodes(){
  const el = document.getElementById('nodeList');
  el.innerHTML = S.nodes.map((nd,k)=>{
    fixNode(k);
    const e = D.ext[nd.miner] || {};
    const resOpts = D.resources.map(i=>`<option value="${i}" ${i===nd.res?'selected':''}>${itemLabel(i)}</option>`).join('');
    const mOpts = extFor(nd.res).map(([c,ex])=>`<option value="${c}" ${c===nd.miner?'selected':''}>${ex.j}</option>`).join('');
    const pur = e.noPurity
      ? `<select disabled><option>—</option></select>`
      : `<select onchange="updNode(${k},'purity',this.value)"><option value="0.5" ${nd.purity===0.5?'selected':''}>低純度</option><option value="1" ${nd.purity===1?'selected':''}>普通</option><option value="2" ${nd.purity===2?'selected':''}>高純度</option></select>`;
    return `<div class="noderow">
      <div><span class="nlab">資源</span><select onchange="updNode(${k},'res',this.value)">${resOpts}</select></div>
      <div><span class="nlab">採掘設備</span><select onchange="updNode(${k},'miner',this.value)">${mOpts}</select></div>
      <div><span class="nlab">純度</span>${pur}</div>
      <div><span class="nlab">OC%</span><input type="number" min="1" max="250" value="${nd.oc}" onchange="updNode(${k},'oc',this.value)"></div>
      <div><span class="nlab">基数</span><input type="number" min="1" value="${nd.count}" onchange="updNode(${k},'count',this.value)"></div>
      <button class="del" onclick="delNode(${k})" title="削除">✕</button>
    </div>`;
  }).join('');
}

// ---------- rendering ----------
function recipeSelect(i){
  const ps = producers[i];
  if (isRes(i) || !ps.length) return '';
  const cur = chosen(i);
  let h = `<select class="rsel" onchange="pickRecipe(${i},this.value)">`;
  ps.forEach(({r,ri})=>{
    const mats = r.i.map(([j])=>itemLabel(j)).join('+') || 'なし';
    const tag = r.a ? '★代替: ' : '';
    h += `<option value="${ri}" ${ri===cur?'selected':''}>${tag}${r.n} [${D.machines[r.m].j}] ← ${mats}</option>`;
  });
  h += `<option value="-1" ${cur===-1?'selected':''}>⛏ 原料として扱う(供給済み)</option></select>`;
  return h;
}

function treeNode(i, rate, path, depth){
  const ri = chosen(i);
  const name = `<span class="iname" style="display:inline">${itemLabel(i)}</span>`;
  const rateS = `<span class="sm-rate">${fmt(rate)}/分</span>`;
  if (path.includes(i)) return `<details class="tn"><summary class="leafy">${name} ${rateS} <span class="cyc">↩ 循環(上位で生産)</span></summary></details>`;
  if (ri < 0 || isRes(i) || depth > 25){
    return `<details class="tn"><summary class="leafy">${name} ${rateS} <span class="rawtag">原料</span></summary></details>`;
  }
  const r = D.recipes[ri];
  const runs = rate / outRate(r,i);
  const g = groupStats(ri, runs);
  const rc = r.a ? `<span class="sm-rc alt">★${r.n}</span>` : `<span class="sm-rc">${r.n}</span>`;
  const ocTag = S.ocR[ri] ? `<span class="sm-rc alt">OC${g.clock}%</span>` : '';
  let h = `<details class="tn" ${depth<4?'open':''}><summary>${name} ${rateS} <span class="sm-mc">${D.machines[r.m].j}×${fmt(g.exact)} (${g.cnt}台)</span> ${rc} ${ocTag} <span class="belt">${beltStr(rate, D.items[i].l)}</span></summary>`;
  r.i.forEach(([j,rt]) => { h += treeNode(j, runs*rt, [...path,i], depth+1); });
  h += `</details>`;
  return h;
}

function minerEquiv(i, rate){
  const opts = extFor(i);
  if (!opts.length) return '';
  const [c,e] = opts.find(([c])=>c==='Desc_MinerMk2_C') || opts[0];
  return `<span class="belt">≒ ${e.j}(普通/100%)×${fmt(rate/e.rate)}基</span>`;
}

function render(){
  const out = document.getElementById('out');
  let target, rate, headCards = '', chips = '';
  if (S.mode === 'target'){
    target = S.tItem; rate = S.tRate;
    if (target == null || !(rate > 0)){ out.innerHTML = '<div class="panel err">アイテムと生産数を入力してください。</div>'; return; }
  } else {
    target = S.rItem;
    const supply = {};
    S.nodes.forEach(nd => { if (nd.res!=null && D.ext[nd.miner]) supply[nd.res] = (supply[nd.res]||0) + nodeSupply(nd); });
    document.getElementById('rSupply').textContent = '供給量: ' + (Object.keys(supply).length
      ? Object.keys(supply).map(r=>`${itemLabel(+r)} ${fmt(supply[r])}/分`).join(' ／ ') : 'なし');
    if (target == null){ out.innerHTML = '<div class="panel err">作りたいアイテムを入力してください。</div>'; return; }
    if (!Object.keys(supply).length){ out.innerHTML = '<div class="panel err">資源ノードを追加してください。</div>'; return; }
    const unit = solve(target, 1);
    if (!unit.converged){ out.innerHTML = '<div class="panel err">計算が収束しません。循環レシピの組み合わせを見直してください。</div>'; return; }
    let best = Infinity, bneck = null;
    const usage = [];
    for (const rs of Object.keys(supply)){
      const cons = unit.raw[rs] || 0;
      if (cons <= 1e-12){ usage.push({rs:+rs, sup:supply[rs], cons:0, lim:Infinity}); continue; }
      const lim = supply[rs] / cons;
      usage.push({rs:+rs, sup:supply[rs], cons, lim});
      if (lim < best){ best = lim; bneck = +rs; }
    }
    if (!isFinite(best)){
      out.innerHTML = `<div class="panel err">追加した資源はいずれも「${itemLabel(target)}」の生産に使われません(現在のレシピ構成)。レシピ選択か資源を確認してください。</div>`;
      return;
    }
    rate = best;
    headCards = `<div class="card"><div class="v">${fmt(rate)}/分</div><div class="t">最大生産可能数 (${itemLabel(target)})</div></div>`;
    chips = `<div class="panel" style="padding:8px">` + usage.map(u=>{
      if (!isFinite(u.lim)) return `<span class="chip">${itemLabel(u.rs)}: 未使用 (供給 ${fmt(u.sup)}/分)</span>`;
      const used = u.cons * rate;
      const pct = Math.round(used/u.sup*1000)/10;
      return `<span class="chip ${u.rs===bneck?'bneck':''}">${u.rs===bneck?'⚠ ボトルネック ':''}${itemLabel(u.rs)}: ${fmt(used)}/${fmt(u.sup)} (${pct}%)</span>`;
    }).join('') + `</div>`;
  }

  const sol = solve(target, rate);
  if (!sol.converged){ out.innerHTML = '<div class="panel err">計算が収束しません。循環レシピの組み合わせを見直してください。</div>'; return; }

  let totalMachines = 0, totalPower = 0;
  const rows = [];
  [...sol.groups.keys()].forEach(ri => {
    const runs = sol.groups.get(ri);
    const r = D.recipes[ri];
    const g = groupStats(ri, runs);
    totalMachines += g.cnt; totalPower += g.power;
    rows.push({ri, r, g, runs, mainOut: r.o[0][0], prodRate: runs * r.o[0][1]});
  });

  let extPower = 0;
  if (S.mode === 'resource'){
    S.nodes.forEach(nd => { const e = D.ext[nd.miner]; if (e) extPower += nd.count * e.p * Math.pow(nd.oc/100, e.x||EXPO); });
    Object.keys(sol.raw).forEach(j => {
      j = +j;
      if (S.nodes.some(nd=>nd.res===j)) return;
      const opts = extFor(j);
      if (opts.length){ const e = (opts.find(([c])=>c==='Desc_MinerMk2_C')||opts[0])[1]; extPower += Math.ceil(sol.raw[j]/e.rate - 1e-9) * e.p; }
    });
  } else {
    Object.entries(sol.raw).forEach(([j, rt]) => {
      const opts = extFor(+j);
      if (opts.length){ const e = (opts.find(([c])=>c==='Desc_MinerMk2_C')||opts[0])[1]; extPower += Math.ceil(rt/e.rate - 1e-9) * e.p; }
    });
  }

  let h = `<div class="cards">${headCards}
    <div class="card"><div class="v">${totalMachines}</div><div class="t">生産設備 合計台数</div></div>
    <div class="card"><div class="v">${fmt(totalPower)} MW</div><div class="t">生産設備 消費電力</div></div>
    <div class="card"><div class="v">${fmt(extPower)} MW</div><div class="t">採掘設備 電力目安</div></div>
  </div>` + chips;

  h += `<h2>⛏️ 必要な原料</h2><div class="panel"><table><tr><th>原料</th><th style="text-align:right">必要量/分</th><th>搬送</th><th>採掘目安</th></tr>`;
  const rawKeys = Object.keys(sol.raw).map(Number).sort((a,b)=>sol.raw[b]-sol.raw[a]);
  if (!rawKeys.length) h += `<tr><td colspan="4" class="belt">なし</td></tr>`;
  rawKeys.forEach(j => {
    h += `<tr><td class="iname">${itemLabel(j)}<small>${D.items[j].n}</small></td><td class="num">${fmt(sol.raw[j])}</td><td class="belt">${beltStr(sol.raw[j], D.items[j].l)}</td><td>${minerEquiv(j, sol.raw[j])}</td></tr>`;
  });
  h += `</table></div>`;

  h += `<h2>🏭 生産工程 (集計) — レシピと個別OCはここで変更</h2><div class="panel"><table><tr><th>アイテム / レシピ選択</th><th style="text-align:right">生産量/分</th><th>設備 / 個別OC</th><th style="text-align:right">電力</th></tr>`;
  rows.sort((a,b)=>b.g.power-a.g.power);
  rows.forEach(({r,g,mainOut,prodRate,ri}) => {
    const cntS = g.frac>1e-6 ? `${g.cnt}台 <span class="belt">(内1台 ${fmt(g.lastClock)}%)</span>` : `${g.cnt}台`;
    const ov = S.ocR[ri] ? 'ov' : '';
    h += `<tr><td><span class="iname">${itemLabel(mainOut)}</span> ${recipeSelect(mainOut)}</td>
      <td class="num">${fmt(prodRate)}<div class="belt">${beltStr(prodRate, D.items[mainOut].l)}</div></td>
      <td class="mch">${D.machines[r.m].j}<br>${cntS}<div class="belt">OC <input type="number" class="ocin ${ov}" min="1" max="250" value="${g.clock}" onchange="setOC(${ri},this.value)">%</div></td>
      <td class="num">${fmt(g.power)} MW</td></tr>`;
  });
  h += `</table></div>`;

  const surKeys = Object.keys(sol.surplus).map(Number);
  if (surKeys.length){
    h += `<h2>♻️ 副産物・余剰</h2><div class="panel">`;
    surKeys.forEach(j => h += `<span class="chip byp">${itemLabel(j)}: ${fmt(sol.surplus[j])}/分</span>`);
    h += `<div class="note">${S.byp?'副産物は可能な限り材料に充当済み。残りは余剰です(シンク等で処理)。':'副産物の充当はオフです。'}</div></div>`;
  }

  h += `<h2>🌳 リソースチェーン</h2><div class="panel" style="overflow-x:auto">${treeNode(target, rate, [], 0)}
  <div class="note">▸をタップで展開/折りたたみ。台数は各枝の必要量ベース(共通部品は集計表で合算されます)。</div></div>`;

  out.innerHTML = h;
}

// ---------- events ----------
function pickRecipe(i, v){ S.choice[i] = parseInt(v); autosave(); render(); }
function setOC(ri, v){
  const n = parseFloat(v);
  if (!n || n === S.pOC) delete S.ocR[ri]; else S.ocR[ri] = Math.min(250, Math.max(1, n));
  autosave(); render();
}
function setMode(m){
  S.mode = m;
  document.getElementById('tabT').classList.toggle('on', m==='target');
  document.getElementById('tabR').classList.toggle('on', m==='resource');
  document.getElementById('pnlTarget').style.display = m==='target'?'':'none';
  document.getElementById('pnlRes').style.display = m==='resource'?'':'none';
  autosave(); render();
}
function findItem(label){
  if (!label) return null;
  const t = label.trim().toLowerCase();
  let i = D.items.findIndex(it => it.j.toLowerCase()===t || it.n.toLowerCase()===t || `${it.j} (${it.n})`.toLowerCase()===t);
  if (i<0) i = D.items.findIndex(it => it.j.toLowerCase().includes(t) || it.n.toLowerCase().includes(t));
  return i>=0 ? i : null;
}

function bind(){
  const dl = document.getElementById('itemList');
  const makeable = new Set(); D.recipes.forEach(r=>r.o.forEach(o=>makeable.add(o[0])));
  [...makeable].sort((a,b)=>itemLabel(a).localeCompare(itemLabel(b),'ja')).forEach(i=>{
    const o = document.createElement('option');
    o.value = D.items[i].j === D.items[i].n ? D.items[i].n : `${D.items[i].j} (${D.items[i].n})`;
    dl.appendChild(o);
  });
  document.getElementById('tItem').addEventListener('change', e=>{ S.tItem = findItem(e.target.value); autosave(); render(); });
  document.getElementById('tRate').addEventListener('input', e=>{ S.tRate = parseFloat(e.target.value)||0; autosave(); render(); });
  document.getElementById('rItem').addEventListener('change', e=>{ S.rItem = findItem(e.target.value); autosave(); render(); });
  document.getElementById('pOC').addEventListener('input', e=>{ S.pOC = Math.min(250,Math.max(1,parseFloat(e.target.value)||100)); autosave(); render(); });
  document.getElementById('bypCredit').addEventListener('change', e=>{ S.byp = e.target.checked; autosave(); render(); });
}

// ---------- save / share ----------
const LSK = 'sf-planner';
function stateStr(){ return JSON.stringify(S); }
function applyState(o){
  if (!o.nodes && o.rRes !== undefined){
    o.nodes = [{res:o.rRes, purity:o.rPurity||1, miner:o.rMiner||'Desc_MinerMk2_C', oc:o.rOC||100, count:o.rCount||1}];
  }
  S = Object.assign(S, o);
  if (!S.ocR) S.ocR = {};
  if (!Array.isArray(S.nodes) || !S.nodes.length) S.nodes = [{res:D.resources[0], purity:1, miner:'Desc_MinerMk2_C', oc:100, count:1}];
  document.getElementById('tRate').value = S.tRate;
  document.getElementById('pOC').value = S.pOC;
  document.getElementById('bypCredit').checked = S.byp;
  if (S.tItem!=null) document.getElementById('tItem').value = itemLabel(S.tItem);
  if (S.rItem!=null) document.getElementById('rItem').value = itemLabel(S.rItem);
  renderNodes();
  setMode(S.mode);
}
function autosave(){ try{ localStorage.setItem(LSK+'-auto', stateStr()); }catch(e){} }
function saveDesign(){
  const name = document.getElementById('saveName').value.trim() || '設計'+new Date().toLocaleString('ja-JP');
  const all = JSON.parse(localStorage.getItem(LSK+'-saves')||'{}');
  all[name] = stateStr();
  localStorage.setItem(LSK+'-saves', JSON.stringify(all));
  listSaves(); toast('保存しました: '+name);
}
function listSaves(){
  const all = JSON.parse(localStorage.getItem(LSK+'-saves')||'{}');
  const el = document.getElementById('saveList');
  el.innerHTML = Object.keys(all).map(n=>
    `<div class="si"><span>${n}</span><button class="ghost" onclick='loadDesign(${JSON.stringify(n)})'>読込</button><button class="ghost" onclick='delDesign(${JSON.stringify(n)})'>削除</button></div>`).join('');
}
function loadDesign(n){
  const all = JSON.parse(localStorage.getItem(LSK+'-saves')||'{}');
  if (all[n]){ applyState(JSON.parse(all[n])); toast('読み込みました'); }
}
function delDesign(n){
  const all = JSON.parse(localStorage.getItem(LSK+'-saves')||'{}');
  delete all[n]; localStorage.setItem(LSK+'-saves', JSON.stringify(all)); listSaves();
}
function shareURL(){
  const u = location.href.split('#')[0] + '#' + encodeURIComponent(btoa(unescape(encodeURIComponent(stateStr()))));
  (navigator.clipboard ? navigator.clipboard.writeText(u) : Promise.reject()).then(()=>toast('URLをコピーしました'),()=>prompt('この URL をコピーしてください', u));
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none', 1800); }

// ---------- init ----------
if (typeof document !== 'undefined' && document.getElementById('out')){
  bind(); listSaves();
  let loaded = false;
  if (location.hash.length > 1){
    try{ applyState(JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(location.hash.slice(1))))))); loaded = true; }catch(e){}
  }
  if (!loaded){
    try{ const a = localStorage.getItem(LSK+'-auto'); if (a){ applyState(JSON.parse(a)); loaded = true; } }catch(e){}
  }
  if (!loaded){
    S.tItem = D.items.findIndex(it=>it.n==='Modular Frame');
    S.nodes = [{res:D.resources[0], purity:1, miner:'Desc_MinerMk2_C', oc:100, count:1}];
    document.getElementById('tItem').value = itemLabel(S.tItem);
    renderNodes();
    render();
  }
}
</script>
</body>
